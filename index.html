<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ivan Quinsaat | Engineering Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#120b06;
      --text:#f2e6d0;
      --muted:#c9b79b;
      --border: rgba(210, 176, 120, .25);
      --link:#f2e6d0;

      --shadow: 0 18px 45px rgba(0,0,0,.55);
      --radius: 20px;
      --max: 980px;
    }

    *{box-sizing:border-box}

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      color:var(--text);
      line-height:1.65;
      font-family: "IM Fell English", ui-serif, Georgia, "Times New Roman", Times, serif;
      overflow-x:hidden;
      -webkit-font-smoothing: antialiased; 
      -moz-osx-font-smoothing: grayscale;
      background: #0b0603;
    }

    p{margin:0 0 12px}
    .muted{color:var(--muted)}

    a{
      color:var(--link);
      text-underline-offset: 4px;
      text-decoration-color: rgba(198,154,91,.6);
    }
    a:hover{
      color: #fff3dc;
      text-decoration-color: rgba(198,154,91,.95);
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:-4;
      background-image:
        linear-gradient(rgba(10,6,3,.6), rgba(10,6,3,.7)),
        url("assets/index-bg.jpg");
      background-size:cover;
      background-position:center;
      filter: saturate(0.95) contrast(1.05);
      transform: scale(1.02);
    }

    .scrim {
      position: fixed;
      inset: 0;
      z-index: -2;
      background-color: #0b0603;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s ease-out;
    }

    .grain{
      position:fixed;
      inset:-40px;
      z-index:-3;
      pointer-events:none;
      opacity:.14;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.02) 0px,
          rgba(255,255,255,.02) 1px,
          transparent 2px,
          transparent 5px
        );
      mix-blend-mode: overlay;
    }

    .parallax-layer{
      pointer-events:none;
      position:fixed;
      inset:0;
      z-index:-1;
      overflow:hidden;
    }

    .star{
      position:absolute;
      width:3px;
      height:3px;
      border-radius:50%;
      background:rgba(255,240,210,.9);
      box-shadow:0 0 6px rgba(255,240,210,.9);
      opacity:0.7;
      animation: twinkle 3s ease-in-out infinite alternate;
    }
    .star.slow{ animation-duration:5s; opacity:0.4; }
    .star.fast{ animation-duration:2s; }

    @keyframes twinkle{
      from{ transform:scale(0.6); opacity:0.4; }
      to{ transform:scale(1.1); opacity:0.9; }
    }

    .nav{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:20;
      backdrop-filter: blur(12px);
      background:linear-gradient(
        180deg,
        rgba(8,4,2,.94),
        rgba(8,4,2,.76),
        transparent
      );
      border-bottom:1px solid rgba(210,176,120,.18);
    }
    .nav-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:10px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      font-size:14px;
    }
    .nav-left{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .nav-name{
      font-family:"Cinzel", ui-serif, Georgia, serif;
      letter-spacing:.12em;
      font-size:13px;
      text-transform:uppercase;
      opacity:.9;
    }

    .nav-cv{
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(10,6,3,.7);
      color:var(--muted);
      text-decoration:none;
    }

    .nav-links{
      display:flex;
      gap:14px;
      align-items:center;
      flex-wrap:wrap;
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .nav-links a{
      text-decoration:none;
      color:var(--muted);
    }
    .nav-links a:hover{
      color:var(--text);
    }

    /* HERO – "Ivan Quinsaat" locked to viewport center */
    .hero{
      height: calc(100vh - 52px);  /* full viewport minus nav height */
      position: relative;
    }

    .nameplate{
      max-width:640px;
      margin:0 auto;
      position:relative;
    }

    .hero-title{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%); /* exact center */
      margin:0;
      font-family:"Cinzel", ui-serif, Georgia, serif;
      font-weight:700;
      letter-spacing:0.08em;
      font-size:clamp(56px, 6vw, 92px);
      text-shadow:0 1px 0 rgba(0,0,0,.6);
      white-space:nowrap;
      line-height:1;
    }

    /* Subtitle / blurb / buttons rendered below the center line */
    .hero-below{
      padding-top: calc(50vh - 52px + 60px); /* just under name */
      text-align:center;
    }

    .subtitle{
      margin: 0;
      font-size: clamp(16px, 2.2vw, 22px);
      letter-spacing: 0.10em;
      opacity: 0.85;
      color: var(--muted);
      text-transform:uppercase;
    }

    .divider{
      width: min(520px, 86%);
      height:1px;
      margin: 16px auto 18px;
      background: linear-gradient(90deg, transparent, rgba(198,154,91,.55), transparent);
    }

    .hero-blurb{
      max-width:520px;
      margin:0 auto 22px;
      font-size:15px;
      color:var(--muted);
    }

    .hero-cta{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
    }

    .btn{
      border-radius:999px;
      border:1px solid var(--border);
      padding:8px 18px;
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:linear-gradient(135deg, rgba(198,154,91,.32), rgba(47,27,15,.9));
      color:var(--text);
      cursor:pointer;
      text-decoration:none;
      box-shadow:0 8px 24px rgba(0,0,0,.45);
    }
    .btn-outline{
      background:rgba(10,6,3,.45);
      color:var(--muted);
    }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding: 0 20px 80px;
    }

    .section{
      margin-top: 34px;
    }
    .section h2{
      margin: 0 0 12px;
      font-family:"Cinzel", ui-serif, Georgia, serif;
      letter-spacing:.05em;
      font-size: 22px;
      color: var(--text);
      text-transform:uppercase;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:16px;
    }

    .card{
      grid-column: span 12;
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      border:1px solid var(--border);
      background:
        radial-gradient(700px 220px at 20% 0%, rgba(139,94,52,.18), transparent 60%),
        linear-gradient(180deg, rgba(26,17,10,.68), rgba(20,13,7,.78));
      box-shadow: 0 14px 40px rgba(0,0,0,.45);
      position:relative;
      overflow:hidden;
      transition: transform .25s ease-out, box-shadow .25s ease-out, border-color .25s;
    }

    .card:hover{
      transform: translateY(-6px);
      box-shadow: 0 18px 50px rgba(0,0,0,.6);
      border-color: rgba(220,184,136,.7);
    }

    .card:before{
      content:"";
      position:absolute;
      left:14px;
      right:14px;
      top:12px;
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(198,154,91,.55), transparent);
      opacity:.9;
    }

    .card h3{
      margin: 10px 0 8px;
      font-family:"Cinzel", ui-serif, Georgia, serif;
      font-weight:700;
      letter-spacing:.03em;
      font-size:18px;
    }

    .card-meta{
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
